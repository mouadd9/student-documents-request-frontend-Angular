<!-- src/app/demandes-list/demandes-list.component.html -->

<div>
    <div class="card-header">
        <h3>Reclamations</h3>
        <p>Liste des Reclamations qui nécessitent une action</p>
      </div>
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>CIN</th>
          <th>Apogee Number</th>
          <th>Description</th>
          <th>Status</th>
          <!-- <th>Submission Date</th> -->
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let reclamation of reclamations">
          <td>{{ reclamation.email }}</td>
          <td>{{ reclamation.cin }}</td>
          <td>{{ reclamation.numApogee }}</td>
          <td><textarea type="text" readonly>{{ reclamation.message }}</textarea></td>
          <td>
            <span class="status-badge" 
              [class.status-en-attente]="reclamation.status === 'EN_ATTENTE'" 
              [class.status-traitee]="reclamation.status === 'TRAITEE'">
              {{ reclamation.status }}
            </span>
          </td>
          <td>
            <button class="btn approve">
                <!-- (click)="approveReclamation(reclamation)" -->
                <img src="assets/icons/approve_white.svg" alt="Approuver Icon" class="icon-svg">
                Traiter
            </button>
            <button class="btn reject">
                <!-- (click)="rejectReclamation(reclamation)" -->
                <img src="assets/icons/reject_white.svg" alt="Rejeter Icon" class="icon-svg">
                Ignorer
            </button>
          </td>
        </tr>
      </tbody>
    </table>
</div>
